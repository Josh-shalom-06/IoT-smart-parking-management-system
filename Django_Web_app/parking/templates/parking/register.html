<!-- templates/parking/register.html -->
{% extends 'parking/base.html' %}

{% block title %}Register{% endblock %}

{% block content %}
<div class="card shadow p-4">
    <h2 class="mb-4">Register RFID User</h2>
    <form method="post">{% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn btn-primary">Register</button>
    </form>
    <p class="mt-3"><a href="{% url 'login' %}">Already registered? Login here</a></p>
</div>
{% endblock %}
